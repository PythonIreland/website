---
# https://taskfile.dev

version: '3'

vars:
  # Detect current git branch and normalize the name
  # (replace / with - and remove special characters)
  GIT_BRANCH:
    sh: git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]' || echo "dev"

env:
  # Pass branch name to docker-compose
  GIT_BRANCH: "{{.GIT_BRANCH}}"
  # Docker image tagged by branch
  DOCKER_IMAGE: "python.ie/website:{{.GIT_BRANCH}}"
  # Database isolated by branch
  PGDATABASE: "pythonie_{{.GIT_BRANCH}}"
  PGPASSWORD: pythonie
  PGUSER: postgres
  PGHOST: 127.0.0.1
  HEROKU_APP: pythonie
  # Dynamic ports (optional - can stay fixed if running only one instance at a time)
  WEB_PORT: 8000
  PG_PORT: 5432

dotenv: ['production.env']

tasks:
  database:drop:
    desc: Drop the local PostgreSQL database
    cmds:
      - docker compose exec -u postgres postgres dropdb --if-exists $PGDATABASE

  database:pull:
    desc: Pull the database from Heroku and store it into a localhost PostgreSQL
    cmds:
      - heroku pg:pull $HEROKU_POSTGRESQL_IDENTIFIER $PGDATABASE

  database:push:
    desc: Push the database from local PostgreSQL to Heroku
    cmds:
      - heroku pg:push $PGDATABASE $HEROKU_POSTGRESQL_IDENTIFIER

  database:reset:
    desc: Reset the database with a fresh copy of the official database
    cmds:
      - task: database:drop
      - task: database:pull

  heroku:database:backups:
    desc: Show the backups of the database
    cmds:
      - heroku pg:backups

  heroku:database:run-backup:
    desc: Run a remote backup
    cmds:
      - heroku pg:backups:capture

  heroku:logs:
    desc: View application logs in real-time
    cmds:
      - heroku logs --tail

  heroku:restart:
    desc: Restart the Heroku application
    cmds:
      - heroku restart

  heroku:shell:
    desc: Run Django shell on Heroku
    cmds:
      - heroku run python pythonie/manage.py shell --settings=pythonie.settings.production

  heroku:bash:
    desc: Run bash shell on Heroku
    cmds:
      - heroku run bash

  heroku:migrate:
    desc: Run database migrations on Heroku
    cmds:
      - heroku run python pythonie/manage.py migrate --settings=pythonie.settings.production

  heroku:config:
    desc: Show Heroku environment variables
    cmds:
      - heroku config

  heroku:ps:
    desc: Show dyno status
    cmds:
      - heroku ps

  heroku:releases:
    desc: Show deployment history
    cmds:
      - heroku releases

  heroku:rollback:
    desc: Rollback to previous release
    cmds:
      - heroku rollback

  heroku:maintenance:on:
    desc: Enable maintenance mode
    cmds:
      - heroku maintenance:on

  heroku:maintenance:off:
    desc: Disable maintenance mode
    cmds:
      - heroku maintenance:off

  env:write:
    desc: Write environment variables to .env file for docker-compose
    cmds:
      - |
        cat > .env <<EOF
        GIT_BRANCH={{.GIT_BRANCH}}
        WEB_PORT=${WEB_PORT:-8000}
        PG_PORT=${PG_PORT:-5432}
        EOF
    silent: true

  run:postgres:
    desc: Only run the PostgreSQL server, for example, if you want to restore the database from Heroku
    deps: [env:write]
    cmds:
      - docker compose run --remove-orphans --detach --service-ports postgres

  run:
    desc: Run a local version of PythonIE
    deps: [env:write]
    cmds:
      - docker compose run --remove-orphans --rm --service-ports web python pythonie/manage.py runserver 0.0.0.0:8000

  django:shell-plus:
    desc: Run Django shell_plus
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py shell_plus

  shell:
    desc: Run a shell
    deps: [env:write]
    cmds:
      - docker compose run --rm web /bin/bash

  django:make-migrations:
    desc: Make migrations
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py makemigrations

  django:migrate:
    desc: Run database migrations
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py migrate

  django:migrate:postgres:
    desc: Run database migrations on PostgreSQL (docker-compose)
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py migrate --settings=pythonie.settings.pgdev

  django:showmigrations:
    desc: Show migration status
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py showmigrations --settings=pythonie.settings.pgdev

  django:collect-static:
    desc: Collect static files
    deps: [env:write]
    cmds:
      - docker compose run --rm web python pythonie/manage.py collectstatic

  django:generate-sample-data:
    desc: Generate sample data for development
    cmds:
      - |
        if command -v docker >/dev/null 2>&1 && docker ps >/dev/null 2>&1; then
          docker compose run --rm web python pythonie/manage.py generate_sample_data
        else
          python pythonie/manage.py generate_sample_data --settings=pythonie.settings.dev
        fi

  dependencies:compute:
    desc: Compute the dependencies
    cmds:
      - toast deps:compute

  dependencies:outdated:
    desc: List the outdated dependencies
    cmds:
      - toast deps:outdated

  dependencies:upgrade:
    desc: Upgrade the dependencies
    cmds:
      - toast deps:upgrade

  dependencies:upgrade:django:
    desc: Upgrade Django to the latest compatible version
    cmds:
      - toast deps:upgrade:django

  dependencies:upgrade:wagtail:
    desc: Upgrade Wagtail to the latest compatible version
    cmds:
      - toast deps:upgrade:wagtail

  dependencies:security:
    desc: Check dependencies for known security vulnerabilities
    cmds:
      - toast deps:security

  dependencies:tree:
    desc: Show the dependencies tree
    cmds:
      - toast deps:tree

  docker:build:
    desc: Build the docker image for the current branch
    cmds:
      - echo "Building image for branch {{.GIT_BRANCH}}..."
      - docker build --no-cache -t $DOCKER_IMAGE .

  docker:run:
    desc: Run a shell into the docker container
    deps: [env:write]
    cmds:
      - docker compose run web /bin/bash

  stack:pull:
    desc: Pull the docker images for the stack
    deps: [env:write]
    cmds:
      - docker compose pull postgres redis

  stack:services:
    desc: List the services from the docker compose file
    deps: [env:write]
    cmds:
      - docker compose config --services

  code:format:
    desc: Format the code
    cmds:
      - toast code:format

  code:lint:
    desc: Lint the code and fix issues
    cmds:
      - toast code:lint

  code:check:
    desc: Check code formatting and linting without changes
    cmds:
      - toast code:check

  dependencies:upgrade:package:
    desc: "Upgrade a specific package (usage: task dependencies:upgrade:package PACKAGE=django)"
    cmds:
      - python -m uv pip compile --upgrade-package $PACKAGE --output-file requirements/main.txt requirements/main.in
      - python -m uv pip compile --upgrade-package $PACKAGE --output-file requirements/dev.txt requirements/dev.in
      - python -m uv pip compile --upgrade-package $PACKAGE --output-file requirements/production.txt requirements/production.in

  tests:
    desc: Run all tests
    deps: [env:write]
    cmds:
      - docker compose run --rm -e DJANGO_SETTINGS_MODULE=pythonie.settings.tests web python pythonie/manage.py test pythonie --verbosity=3

  down:
    desc: Stop the docker compose stack
    deps: [env:write]
    cmds:
      - docker compose down

  branch:info:
    desc: Show current branch and environment info
    cmds:
      - echo "Current branch → {{.GIT_BRANCH}}"
      - echo "Docker image → $DOCKER_IMAGE"
      - echo "Database → $PGDATABASE"
      - echo "Web port → $WEB_PORT"
      - echo "Postgres port → $PG_PORT"

  branch:volumes:
    desc: List all Docker volumes for this project (all branches)
    cmds:
      - docker volume ls | grep -E "(postgres-data|redis-data)" || echo "No volumes found"

  branch:clean:
    desc: Remove volumes for the current branch (CAUTION - data will be lost!)
    prompt: This will delete all data for branch {{.GIT_BRANCH}}. Continue?
    cmds:
      - docker volume rm pythonie-postgres-data-{{.GIT_BRANCH}} 2>/dev/null || echo "Postgres volume not found"
      - docker volume rm pythonie-redis-data-{{.GIT_BRANCH}} 2>/dev/null || echo "Redis volume not found"
      - echo "Volumes cleaned for branch {{.GIT_BRANCH}}"
